name: rperf
description: rPerf - Calculate your landing and take-off performance
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3
  provider: ^6.1.2
  file_picker: ^10.3.3
  share_plus: ^12.0.0
  uuid: ^4.4.0
  flutter_file_dialog: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/rperf_logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/rperf_logo.png"
  remove_alpha_ios: true
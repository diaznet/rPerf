name: Dev Build

on:
  push:
    branches:
      - 'dev**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Derive dev version
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          NAME="${LATEST_TAG#v}-dev.$GITHUB_RUN_NUMBER"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "code=$GITHUB_RUN_NUMBER" >> "$GITHUB_OUTPUT"

      - run: flutter pub get

      - run: flutter analyze

      - run: flutter test

      - name: Build dev APK
        run: |
          flutter build apk --release \
            --build-name=${{ steps.version.outputs.name }} \
            --build-number=${{ steps.version.outputs.code }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rperf-dev-${{ steps.version.outputs.name }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
